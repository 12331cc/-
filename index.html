<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <title>设计作品集</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --bunny-thumb: url("sprite-open.png");
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }

    body {
      color: #fff;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    .hero {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      background: #000;
      overflow: hidden;
    }

    .cursor-fx {
      position: fixed;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .hero-video {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .video-status {
      position: fixed;
      left: 50%;
      bottom: max(24px, calc(var(--safe-bottom) + 18px));
      z-index: 3;
      max-width: min(78vw, 420px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.86);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
      transform: translateX(-50%);
      transition: opacity 0.28s ease, visibility 0.28s ease;
      pointer-events: none;
      backdrop-filter: blur(12px);
    }

    .hero.is-ready .video-status {
      opacity: 0;
      visibility: hidden;
    }

    .hero.has-error .video-status {
      opacity: 1;
      visibility: visible;
      color: #fff;
      background: rgba(20, 20, 20, 0.82);
    }

    .loader-screen {
      position: fixed;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      padding:
        max(28px, var(--safe-top))
        max(22px, var(--safe-right))
        max(28px, var(--safe-bottom))
        max(22px, var(--safe-left));
      background:
        radial-gradient(circle at 52% 44%, rgba(255, 85, 176, 0.14), transparent 0 18%, transparent 42%),
        radial-gradient(circle at 46% 58%, rgba(255, 221, 172, 0.12), transparent 0 16%, transparent 38%),
        #000;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.48s ease, visibility 0.48s ease;
      pointer-events: none;
    }

    .hero.is-ready .loader-screen {
      opacity: 0;
      visibility: hidden;
    }

    .hero.has-error .loader-screen {
      opacity: 1;
      visibility: visible;
    }

    .loader-inner {
      display: grid;
      justify-items: center;
      width: min(760px, 92vw);
    }

    .loader-visual {
      position: relative;
      width: min(560px, 86vw);
      height: clamp(220px, 28vw, 330px);
    }

    .loader-rays,
    .loader-orbit {
      position: absolute;
      top: 48%;
      width: 188px;
      height: 188px;
      transform: translate(-50%, -50%);
    }

    .loader-rays {
      left: 31%;
      animation: loaderSpin 2.8s steps(8) infinite;
    }

    .loader-rays span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22px;
      height: 76px;
      margin: -38px 0 0 -11px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 235, 205, 0.98), rgba(255, 68, 145, 0.74));
      box-shadow: 0 0 26px rgba(255, 98, 166, 0.42);
      opacity: calc(0.28 + var(--i) * 0.08);
      transform: rotate(calc(var(--i) * 45deg)) translateY(-70px);
      transform-origin: center 108px;
    }

    .loader-orbit {
      left: 70%;
      animation: loaderFloat 3.4s ease-in-out infinite;
    }

    .loader-orbit span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(16px + var(--s) * 10px);
      height: calc(16px + var(--s) * 10px);
      border-radius: 999px;
      background: linear-gradient(160deg, rgba(255, 225, 202, 0.96), rgba(255, 74, 154, 0.72));
      box-shadow: 0 0 28px rgba(255, 110, 170, 0.36);
      opacity: calc(0.32 + var(--s) * 0.11);
      transform:
        rotate(calc(var(--i) * 32deg))
        translateX(calc(62px + var(--s) * 8px))
        rotate(calc(var(--i) * -32deg));
      animation: loaderDotPulse 1.9s ease-in-out infinite;
      animation-delay: calc(var(--i) * -0.08s);
    }

    .loader-meter {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 5px;
      width: min(350px, 62vw);
      margin-top: -6px;
    }

    .loader-meter span {
      height: 30px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 230, 198, 0.98), rgba(255, 63, 143, 0.8));
      box-shadow: 0 0 18px rgba(255, 93, 162, 0.26);
      opacity: 0.32;
      animation: loaderMeter 1.2s ease-in-out infinite;
      animation-delay: calc(var(--i) * 0.075s);
    }

    .loader-word {
      margin-top: 30px;
      background: linear-gradient(90deg, #ffe1b0, #ff7a9f 48%, #d84791);
      color: transparent;
      font-size: clamp(54px, 8vw, 96px);
      font-weight: 300;
      line-height: 0.92;
      letter-spacing: 0;
      -webkit-background-clip: text;
      background-clip: text;
    }

    .loader-screen .video-status {
      position: static;
      left: auto;
      bottom: auto;
      max-width: min(72vw, 420px);
      margin-top: 18px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: rgba(255, 235, 226, 0.72);
      font-size: 14px;
      transform: none;
      opacity: 1;
      visibility: visible;
      backdrop-filter: none;
    }

    .hero.has-error .loader-screen .video-status {
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 0 18px rgba(255, 83, 150, 0.62);
    }

    @keyframes loaderSpin {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    @keyframes loaderFloat {
      0%,
      100% {
        transform: translate(-50%, -50%) rotate(-5deg) scale(1);
      }

      50% {
        transform: translate(-50%, -54%) rotate(8deg) scale(1.04);
      }
    }

    @keyframes loaderDotPulse {
      0%,
      100% {
        filter: saturate(0.96);
        transform:
          rotate(calc(var(--i) * 32deg))
          translateX(calc(62px + var(--s) * 8px))
          rotate(calc(var(--i) * -32deg))
          scale(0.86);
      }

      50% {
        filter: saturate(1.3);
        transform:
          rotate(calc(var(--i) * 32deg))
          translateX(calc(62px + var(--s) * 8px))
          rotate(calc(var(--i) * -32deg))
          scale(1.08);
      }
    }

    @keyframes loaderMeter {
      0%,
      100% {
        opacity: 0.32;
        transform: translateY(0) scaleY(0.9);
      }

      50% {
        opacity: 1;
        transform: translateY(-4px) scaleY(1.08);
      }
    }

    .mobile-play {
      display: none;
    }

    .mobile-progress {
      display: none;
    }

    .mobile-info {
      display: none;
    }

    .hero.is-playing .mobile-play.is-smiling {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1.04);
    }

    @media (min-width: 761px) and (orientation: landscape) {
      .mobile-play {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 4;
        display: grid;
        width: 108px;
        height: 96px;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.46);
        border-radius: 48% 52% 56% 44% / 50% 49% 51% 50%;
        background:
          radial-gradient(ellipse at 35% 18%, rgba(255, 255, 255, 0.98) 0 12%, rgba(255, 255, 255, 0.42) 22%, transparent 43%),
          radial-gradient(ellipse at 52% 88%, rgba(255, 255, 255, 0.94) 0 18%, rgba(118, 242, 255, 0.22) 38%, transparent 60%),
          radial-gradient(circle at 76% 34%, rgba(255, 93, 202, 0.86), transparent 42%),
          radial-gradient(circle at 28% 64%, rgba(97, 236, 255, 0.78), transparent 46%),
          linear-gradient(170deg, rgba(255, 247, 255, 0.96) 0%, rgba(255, 99, 190, 0.9) 42%, rgba(255, 213, 101, 0.92) 100%);
        box-shadow:
          inset 0 12px 20px rgba(255, 255, 255, 0.42),
          inset 0 -18px 28px rgba(255, 121, 202, 0.22),
          0 18px 42px rgba(255, 74, 181, 0.3),
          0 0 42px rgba(80, 228, 255, 0.26),
          0 0 86px rgba(255, 224, 97, 0.16);
        transform: translate(-50%, -50%) scale(1);
        transition: opacity 0.32s ease, visibility 0.32s ease, transform 0.32s ease;
        animation: playBlob 3.2s ease-in-out infinite, playPulse 2.4s ease-in-out infinite;
        appearance: none;
      }

      .mobile-play::before {
        position: absolute;
        left: 50%;
        top: 52%;
        width: 34px;
        height: 40px;
        background: rgba(255, 255, 255, 0.96);
        clip-path: polygon(18% 6%, 18% 94%, 92% 50%);
        filter:
          drop-shadow(0 0 10px rgba(255, 255, 255, 0.96))
          drop-shadow(0 0 22px rgba(120, 235, 255, 0.55));
        transform: translate(-38%, -50%);
        content: "";
      }

      .mobile-play::after {
        position: absolute;
        left: 58%;
        top: -8px;
        width: 30px;
        height: 26px;
        border-radius: 64% 36% 61% 39% / 58% 38% 62% 42%;
        background:
          radial-gradient(circle at 40% 26%, rgba(255, 255, 255, 0.9), transparent 36%),
          linear-gradient(180deg, rgba(160, 255, 232, 0.95), rgba(117, 183, 255, 0.82), rgba(255, 115, 211, 0.42));
        box-shadow:
          inset 0 5px 10px rgba(255, 255, 255, 0.62),
          0 0 18px rgba(116, 226, 255, 0.42);
        transform: translateX(-50%) rotate(7deg);
        content: "";
      }

      .mobile-play:active {
        transform: translate(-50%, -50%) scale(0.94);
      }

      .mobile-play > span {
        pointer-events: none;
      }

      .mobile-play__eyes {
        position: absolute;
        left: 27px;
        top: 40px;
        display: block;
        width: 11px;
        height: 20px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow:
          20px 0 0 rgba(255, 255, 255, 0.92),
          0 0 12px rgba(255, 255, 255, 0.8),
          20px 0 12px rgba(255, 255, 255, 0.72);
        opacity: 0.92;
      }

      .mobile-play__spark {
        position: absolute;
        inset: -24px;
        border-radius: 50%;
        background:
          conic-gradient(from 28deg, transparent 0 10%, rgba(106, 238, 255, 0.38) 12%, transparent 18% 37%, rgba(255, 90, 199, 0.34) 40%, transparent 47% 66%, rgba(255, 222, 91, 0.32) 70%, transparent 78% 100%);
        filter: blur(6px);
        opacity: 0.42;
        animation: playHalo 5.2s linear infinite;
      }

      .mobile-play__shadow {
        position: absolute;
        left: 50%;
        bottom: -24px;
        width: 82px;
        height: 19px;
        border-radius: 50%;
        background: radial-gradient(ellipse, rgba(255, 169, 221, 0.43), rgba(91, 231, 255, 0.2) 38%, transparent 70%);
        filter: blur(5px);
        transform: translateX(-50%);
      }

      .hero.is-playing .mobile-play {
        opacity: 0;
        visibility: hidden;
        transform: translate(-50%, -50%) scale(1.22) rotate(8deg);
      }

      .mobile-progress {
        position: fixed;
        left: 50%;
        bottom: max(42px, calc(var(--safe-bottom) + 34px));
        z-index: 4;
        display: block;
        width: min(720px, 58vw);
        height: 34px;
        margin: 0;
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 999px;
        background:
          radial-gradient(circle at calc(var(--progress, 0%) + 3px) 50%, rgba(255, 255, 255, 0.66), transparent 0 24px, transparent 25px),
          linear-gradient(90deg, rgba(107, 235, 255, 0.9), rgba(255, 81, 197, 0.9), rgba(255, 226, 88, 0.88)) 0 50% / var(--progress, 0%) 10px no-repeat,
          repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.32) 0 11px, rgba(255, 255, 255, 0.07) 11px 22px) 12px 50% / max(var(--progress, 0%), 32px) 10px no-repeat,
          linear-gradient(90deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06));
        opacity: 0;
        transform: translateX(-50%);
        transition: opacity 0.28s ease;
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.34),
          inset 0 -8px 18px rgba(0, 0, 0, 0.2),
          0 0 24px rgba(81, 232, 255, 0.18),
          0 0 46px rgba(255, 85, 199, 0.14);
        -webkit-appearance: none;
        appearance: none;
      }

      .hero.is-ready .mobile-progress {
        opacity: 0.88;
      }

      .hero.has-error .mobile-progress {
        display: none;
      }

      .mobile-progress::-webkit-slider-runnable-track {
        height: 10px;
        border-radius: 999px;
        background: transparent;
      }

      .mobile-progress::-webkit-slider-thumb {
        width: 36px;
        height: 36px;
        margin-top: -13px;
        border: 2px solid rgba(255, 255, 255, 0.68);
        border-radius: 54% 46% 53% 47% / 50% 45% 55% 50%;
        background:
          radial-gradient(circle at 33% 24%, rgba(255, 255, 255, 0.95) 0 13%, rgba(255, 255, 255, 0.38) 24%, transparent 42%),
          radial-gradient(ellipse at 50% 88%, rgba(255, 255, 255, 0.86), transparent 46%),
          linear-gradient(165deg, rgba(255, 248, 255, 0.98), rgba(255, 92, 195, 0.88) 44%, rgba(255, 224, 99, 0.94));
        box-shadow:
          inset 0 8px 12px rgba(255, 255, 255, 0.48),
          inset 0 -7px 12px rgba(255, 96, 194, 0.26),
          0 0 0 8px rgba(255, 255, 255, 0.08),
          0 0 22px rgba(255, 89, 198, 0.64),
          0 0 34px rgba(91, 231, 255, 0.3);
        -webkit-appearance: none;
        appearance: none;
      }

      .mobile-progress::-moz-range-track {
        height: 10px;
        border-radius: 999px;
        background: transparent;
      }

      .mobile-progress::-moz-range-thumb {
        width: 34px;
        height: 34px;
        border: 2px solid rgba(255, 255, 255, 0.68);
        border-radius: 54% 46% 53% 47% / 50% 45% 55% 50%;
        background:
          radial-gradient(circle at 33% 24%, rgba(255, 255, 255, 0.95) 0 13%, rgba(255, 255, 255, 0.38) 24%, transparent 42%),
          radial-gradient(ellipse at 50% 88%, rgba(255, 255, 255, 0.86), transparent 46%),
          linear-gradient(165deg, rgba(255, 248, 255, 0.98), rgba(255, 92, 195, 0.88) 44%, rgba(255, 224, 99, 0.94));
        box-shadow:
          inset 0 8px 12px rgba(255, 255, 255, 0.48),
          inset 0 -7px 12px rgba(255, 96, 194, 0.26),
          0 0 0 8px rgba(255, 255, 255, 0.08),
          0 0 22px rgba(255, 89, 198, 0.64),
          0 0 34px rgba(91, 231, 255, 0.3);
      }

      .mobile-play {
        --eye-x: 0px;
        --eye-y: 0px;
        width: 126px;
        height: 110px;
        border: 0;
        border-radius: 47% 53% 45% 55% / 55% 55% 43% 45%;
        background:
          radial-gradient(ellipse at 34% 17%, rgba(255, 255, 255, 0.92) 0 13%, rgba(255, 255, 255, 0.34) 24%, transparent 48%),
          radial-gradient(ellipse at 55% 92%, rgba(255, 255, 255, 0.88) 0 20%, rgba(255, 255, 255, 0.2) 38%, transparent 60%),
          radial-gradient(circle at 22% 42%, rgba(219, 247, 255, 0.54), transparent 44%),
          radial-gradient(circle at 74% 52%, rgba(194, 132, 255, 0.68), transparent 48%),
          radial-gradient(circle at 45% 78%, rgba(255, 157, 239, 0.62), transparent 44%),
          linear-gradient(160deg, rgba(252, 250, 255, 0.96), rgba(202, 180, 255, 0.88) 48%, rgba(255, 173, 236, 0.88) 100%);
        box-shadow:
          inset 0 10px 18px rgba(255, 255, 255, 0.64),
          inset 0 -16px 28px rgba(184, 119, 255, 0.18),
          inset 0 0 0 3px rgba(206, 176, 255, 0.3),
          0 18px 44px rgba(205, 157, 255, 0.42),
          0 0 64px rgba(255, 134, 232, 0.24);
        animation: bunnyFloat 3.6s ease-in-out infinite, playPulse 2.8s ease-in-out infinite;
      }

      .mobile-play::before,
      .mobile-play::after {
        position: absolute;
        top: -50px;
        width: 48px;
        height: 96px;
        border-radius: 62% 62% 45% 45% / 76% 76% 30% 30%;
        background:
          radial-gradient(ellipse at 38% 18%, rgba(255, 255, 255, 0.78) 0 14%, transparent 38%),
          radial-gradient(ellipse at 50% 80%, rgba(255, 255, 255, 0.36), transparent 54%),
          linear-gradient(165deg, rgba(250, 249, 255, 0.88), rgba(204, 180, 255, 0.68) 58%, rgba(244, 177, 255, 0.58));
        box-shadow:
          inset 0 5px 12px rgba(255, 255, 255, 0.58),
          inset 0 -8px 14px rgba(192, 131, 255, 0.18),
          0 0 20px rgba(203, 168, 255, 0.34);
        content: "";
      }

      .mobile-play::before {
        left: 25px;
        transform: rotate(-24deg);
      }

      .mobile-play::after {
        right: 24px;
        left: auto;
        transform: rotate(24deg);
      }

      .mobile-play__eyes {
        left: 42px;
        top: 51px;
        width: 14px;
        height: 29px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow:
          29px 0 0 rgba(255, 255, 255, 0.96),
          0 0 12px rgba(255, 255, 255, 0.78),
          29px 0 12px rgba(255, 255, 255, 0.74);
        transform: translate(var(--eye-x), var(--eye-y));
        transition: transform 0.12s ease, height 0.18s ease, border-radius 0.18s ease;
      }

      .mobile-play__eyes::after {
        position: absolute;
        left: 6px;
        top: 33px;
        width: 34px;
        height: 16px;
        border-bottom: 4px solid rgba(255, 255, 255, 0.88);
        border-radius: 0 0 999px 999px;
        opacity: 0;
        transform: translateY(-5px) scaleX(0.72);
        transition: opacity 0.22s ease, transform 0.22s ease;
        content: "";
      }

      .mobile-play.is-smiling .mobile-play__eyes {
        height: 16px;
        border-radius: 999px 999px 55% 55%;
      }

      .mobile-play.is-smiling .mobile-play__eyes::after {
        opacity: 1;
        transform: translateY(0) scaleX(1);
      }

      .mobile-play__spark {
        inset: -38px;
        opacity: 0.36;
        filter: blur(7px);
        background:
          conic-gradient(from 20deg, transparent 0 13%, rgba(218, 189, 255, 0.36) 16%, transparent 23% 45%, rgba(255, 157, 237, 0.32) 49%, transparent 58% 78%, rgba(255, 255, 255, 0.28) 82%, transparent 92% 100%);
      }

      .mobile-play__shadow {
        bottom: -30px;
        width: 102px;
        height: 24px;
        background: radial-gradient(ellipse, rgba(216, 181, 255, 0.42), rgba(255, 160, 238, 0.22) 42%, transparent 72%);
      }

      .mobile-progress,
      .hero.is-ready .mobile-progress {
        display: none;
        opacity: 0;
        pointer-events: none;
      }

      @keyframes bunnyFloat {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
        }

        45% {
          transform: translate(-50%, -53%) scale(1.025);
        }

        72% {
          transform: translate(-50%, -49%) scale(0.99);
        }
      }

      @keyframes playPulse {
        0%,
        100% {
          box-shadow:
            inset 0 12px 20px rgba(255, 255, 255, 0.42),
            inset 0 -18px 28px rgba(255, 121, 202, 0.22),
            0 18px 42px rgba(255, 74, 181, 0.3),
            0 0 42px rgba(80, 228, 255, 0.26),
            0 0 86px rgba(255, 224, 97, 0.16);
        }

        50% {
          box-shadow:
            inset 0 14px 24px rgba(255, 255, 255, 0.5),
            inset 0 -20px 30px rgba(255, 121, 202, 0.26),
            0 20px 48px rgba(255, 74, 181, 0.38),
            0 0 58px rgba(80, 228, 255, 0.38),
            0 0 104px rgba(255, 224, 97, 0.22);
        }
      }

      @keyframes playBlob {
        0%,
        100% {
          border-radius: 48% 52% 56% 44% / 50% 49% 51% 50%;
          transform: translate(-50%, -50%) scale(1);
        }

        36% {
          border-radius: 55% 45% 48% 52% / 45% 55% 45% 55%;
          transform: translate(-50%, -51%) scale(1.025) rotate(-1deg);
        }

        68% {
          border-radius: 45% 55% 54% 46% / 54% 46% 54% 46%;
          transform: translate(-50%, -49%) scale(0.99) rotate(1deg);
        }
      }

      @keyframes playHalo {
        to {
          transform: rotate(360deg);
        }
      }
    }

    @media (max-width: 760px), (orientation: portrait) {
      .hero {
        padding:
          var(--safe-top)
          var(--safe-right)
          var(--safe-bottom)
          var(--safe-left);
      }

      .hero-video {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .video-status {
        bottom: max(16px, calc(var(--safe-bottom) + 14px));
        width: min(82vw, 340px);
        padding: 9px 12px;
        font-size: 12px;
      }

      .loader-inner {
        width: min(390px, 92vw);
      }

      .loader-visual {
        width: min(350px, 88vw);
        height: 250px;
      }

      .loader-rays,
      .loader-orbit {
        width: 150px;
        height: 150px;
      }

      .loader-rays {
        left: 39%;
        top: 44%;
      }

      .loader-rays span {
        width: 18px;
        height: 62px;
        margin: -31px 0 0 -9px;
        transform: rotate(calc(var(--i) * 45deg)) translateY(-56px);
        transform-origin: center 87px;
      }

      .loader-orbit {
        left: 66%;
        top: 51%;
      }

      .loader-orbit span {
        transform:
          rotate(calc(var(--i) * 32deg))
          translateX(calc(48px + var(--s) * 6px))
          rotate(calc(var(--i) * -32deg));
      }

      .loader-meter {

      font-weight: 900;
      letter-spacing: 0;
      opacity: 0.82;
      filter: blur(5.6px);
      transform: translate(4px, 30px) scale(1.04);
      animation: helloJelly 2.5s 0.08s ease-in-out both;
    }

    .hello-fill {
      fill: url("#helloFill");
      stroke: none;
      stroke-width: 0;
      paint-order: fill;
      opacity: 0.88;
      font-family: "Segoe Script", "Brush Script MT", "Comic Sans MS", cursive;
      font-size: 136px;
      font-weight: 900;
      letter-spacing: 0;
      filter: url("#helloJellyFilter");
      animation: helloJelly 2.5s 0.14s ease-in-out both;
    }

    .hello-glow-base {
      fill: url("#helloFill");
      stroke: none;
      stroke-width: 0;
      paint-order: fill;
      opacity: 0.42;
      font-family: "Segoe Script", "Brush Script MT", "Comic Sans MS", cursive;
      font-size: 136px;
      font-weight: 900;
      letter-spacing: 0;
      filter: url("#helloGlow");
    }

    .hello-depth {
      fill: rgba(124, 82, 238, 0.54);
      stroke: none;
      stroke-width: 0;
      paint-order: fill;
      font-family: "Segoe Script", "Brush Script MT", "Comic Sans MS", cursive;
      font-size: 136px;
      font-weight: 900;
      letter-spacing: 0;
      filter: blur(8px);
      transform: translate(7px, 38px) scale(1.05);
    }

    .hello-bottom-glow {
      fill: url("#helloBottomGlow");
      stroke: none;
      stroke-width: 0;
      font-family: "Segoe Script", "Brush Script MT", "Comic Sans MS", cursive;
      font-size: 136px;
      font-weight: 900;
      letter-spacing: 0;
      opacity: 0.78;
      filter: blur(2px);
      transform: translate(2px, 12px) scale(1.01);
      mix-blend-mode: screen;
      animation: helloJelly 2.5s 0.18s ease-in-out both;
    }

    .hello-inner-light {
      fill: url("#helloInnerLight");
      stroke: none;
      stroke-width: 0;
      font-family: "Segoe Script", "Brush Script MT", "Comic Sans MS", cursive;
      font-size: 136px;
      font-weight: 900;
      letter-spacing: 0;
      opacity: 0.56;
      filter: blur(0.8px);
      transform: translate(-12px, -22px) scale(0.955);
      mix-blend-mode: screen;
      animation: helloJelly 2.5s 0.3s ease-in-out both;
    }

    .hello-gloss {
      fill: rgba(255, 255, 255, 0.5);
      stroke: none;
      stroke-width: 0;
      font-family: "Segoe Script", "Brush Script MT", "Comic Sans MS", cursive;
      font-size: 136px;
      font-weight: 900;
      letter-spacing: 0;
      opacity: 0.52;
      filter: blur(1.4px);
      transform: translate(-14px, -24px) scale(0.95);
      mix-blend-mode: screen;
      animation: helloJelly 2.5s 0.28s ease-in-out both;
    }

    .hello-underline {
      fill: none;
      stroke: url("#helloStroke");
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 420;
      stroke-dashoffset: 420;
      opacity: 0.92;
      filter: drop-shadow(0 8px 14px rgba(202, 164, 255, 0.18));
      animation: helloWrite 0.86s 1.15s ease forwards;
    }

    .hello-orb {
      transform-origin: center;
      opacity: 0;
      animation: helloOrb 1.5s ease forwards;
      mix-blend-mode: normal;
    }

    .hello-orb:nth-child(1) {
      animation-delay: 0.42s;
    }

    .hello-orb:nth-child(2) {
      animation-delay: 0.78s;
    }

    .hello-orb:nth-child(3) {
      animation-delay: 1.05s;
    }

    .mobile-play__eyes {
      display: none !important;
    }

    .sprite-eye-cover {
      position: absolute;
      left: 50%;
      top: 56%;
      z-index: 2;
      width: 76px;
      height: 46px;
      border-radius: 999px;
      background:
        radial-gradient(ellipse at 24% 18%, rgba(244, 251, 255, 0.72), transparent 0 34%, transparent 56%),
        radial-gradient(ellipse at 50% 82%, rgba(255, 178, 239, 0.62), transparent 0 44%, transparent 68%),
        linear-gradient(160deg, rgba(222, 213, 255, 0.92), rgba(219, 188, 255, 0.9) 52%, rgba(255, 184, 241, 0.78));
      filter: blur(5px);
      transform: translate(-50%, -50%) rotate(calc(var(--bunny-tilt) * 0.24));
      pointer-events: none;
      opacity: 0.9;
    }

    .sprite-live-eyes {
      position: absolute;
      left: 50%;
      top: 56%;
      z-index: 3;
      width: 14px;
      height: 33px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow:
        31px 0 0 rgba(255, 255, 255, 0.98),
        0 0 12px rgba(255, 255, 255, 0.8),
        31px 0 12px rgba(255, 255, 255, 0.78);
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.58));
      transform: translate(calc(-50% - 15.5px + var(--eye-x)), calc(-50% + var(--eye-y))) rotate(calc(var(--bunny-tilt) * 0.18));
      transition: width 0.12s ease, height 0.12s ease, transform 0.08s linear;
      pointer-events: none;
    }

    .mobile-play.is-blinking .sprite-live-eyes {
      height: 8px;
      transform: translate(calc(-50% - 15.5px + var(--eye-x)), calc(-50% + 8px + var(--eye-y))) rotate(calc(var(--bunny-tilt) * 0.18));
    }

    .mobile-play.is-pressed .sprite-img,
    .mobile-play.is-pressed .sprite-eye-cover,
    .mobile-play.is-pressed .sprite-live-eyes {
      animation: spriteBoop 0.42s cubic-bezier(0.18, 1.25, 0.24, 1) both;
    }

    .mobile-play.bunny-mark .sprite-img {
      transform: translate(-50%, -50%) rotate(calc(var(--bunny-tilt) * 0.38)) scale(1);
    }

    .mobile-play.bunny-mark.is-smiling .sprite-open {
      transform: translate(-50%, -50%) rotate(calc(var(--bunny-tilt) * 0.26)) scale(1.02);
    }

    .mobile-play.bunny-mark.is-smiling .sprite-smile {
      transform: translate(-50%, -50%) rotate(calc(var(--bunny-tilt) * 0.26)) scale(1.03);
    }

    @keyframes helloWrite {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes helloFill {
      to {
        opacity: 0.95;
      }
    }

    @keyframes helloJelly {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.96);
      }

      34% {
        opacity: 1;
        transform: translateY(0) scale(1.025);
      }

      68% {
        opacity: 0.96;
        transform: translateY(-2px) scale(0.995);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes helloOrb {
      0% {
        opacity: 0;
        transform: scale(0.4);
      }

      42% {
        opacity: 0.9;
        transform: scale(1.18);
      }

      100% {
        opacity: 0.52;
        transform: scale(1);
      }
    }

    @keyframes helloFloat {
      0% {
        opacity: 0;
        transform: translateY(22px) scale(0.94);
      }

      22%,
      82% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(-8px) scale(1.02);
      }
    }

    @keyframes spriteBoop {
      0%,
      100% {
        transform: translate(-50%, -50%) rotate(calc(var(--bunny-tilt) * 0.28)) scale(1);
      }

      45% {
        transform: translate(-50%, -52%) rotate(calc(var(--bunny-tilt) * 0.34)) scale(1.08);
      }
    }

    .hero.intro-done .mobile-progress {
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
      transition: opacity 0.28s ease, visibility 0.28s ease;
    }

    .hero.intro-done .progress-hit {
      display: none !important;
      pointer-events: none !important;
    }

    .hero.intro-done .progress-sprite {
      opacity: 0 !important;
      visibility: hidden !important;
      transition: opacity 0.28s ease, visibility 0.28s ease;
    }

    .hero.intro-done.controls-visible .mobile-progress,
    .hero.intro-done.is-scrubbing .mobile-progress {
      opacity: 0.9 !important;
      visibility: visible !important;
      pointer-events: auto !important;
    }

    .hero.intro-done.controls-visible .progress-hit,
    .hero.intro-done.is-scrubbing .progress-hit {
      display: block !important;
      pointer-events: auto !important;
    }

    .hero.intro-done.controls-visible.has-progress .progress-sprite,
    .hero.intro-done.is-scrubbing .progress-sprite {
      opacity: 1 !important;
      visibility: visible !important;
    }

    .progress-controls {
      position: fixed;
      left: max(20px, calc(var(--safe-left) + 20px));
      right: max(20px, calc(var(--safe-right) + 20px));
      bottom: max(62px, calc(var(--safe-bottom) + 62px));
      z-index: 9;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 34px;
      color: rgba(255, 255, 255, 0.94);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.28s ease, visibility 0.28s ease, transform 0.28s ease;
    }

    .hero.intro-done.controls-visible .progress-controls,
    .hero.intro-done.is-scrubbing .progress-controls {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
    }

    .progress-control-btn {
      display: inline-grid;
      flex: 0 0 auto;
      place-items: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: rgba(255, 255, 255, 0.94);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .progress-control-btn:hover,
    .progress-control-btn:focus-visible {
      background: rgba(255, 255, 255, 0.12);
      transform: scale(1.06);
      outline: none;
    }

    .progress-control-btn svg {
      display: block;
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .fullscreen-btn {
      background: rgba(255, 255, 255, 0.1);
    }

    .pause-icon,
    .volume-off,
    .hero.is-playing .compact-play .play-icon,
    .volume-btn.is-muted .volume-on {
      display: none;
    }

    .hero.is-playing .compact-play .pause-icon,
    .volume-btn.is-muted .volume-off {
      display: block;
    }

    .time-readout {
      display: inline-flex;
      align-items: center;
      min-width: 90px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.72);
    }

    .time-separator {
      padding: 0 4px;
      color: rgba(255, 255, 255, 0.62);
    }

    .control-spacer {
      flex: 1 1 auto;
      min-width: 12px;
    }

    .progress-tooltip {
      position: fixed;
      left: var(--progress-x, 50%);
      top: calc(var(--progress-y, calc(100vh - 58px)) - 42px);
      z-index: 8;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(12, 12, 18, 0.78);
      color: rgba(255, 255, 255, 0.94);
      font: 800 12px/1 Inter, "Segoe UI", Arial, sans-serif;
      font-variant-numeric: tabular-nums;
      box-shadow: 0 0 24px rgba(216, 190, 255, 0.26);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translate(-50%, 6px);
      transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease;
    }

    .hero.intro-done.is-scrubbing .progress-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, 0);
    }

    .hero.intro-done .mobile-progress {
      bottom: max(34px, calc(var(--safe-bottom) + 34px)) !important;
      width: calc(100vw - max(40px, calc(var(--safe-left) + var(--safe-right) + 40px))) !important;
      z-index: 8 !important;
    }

    @media (max-width: 640px) {
      .progress-controls {
        left: max(12px, calc(var(--safe-left) + 12px));
        right: max(12px, calc(var(--safe-right) + 12px));
        bottom: max(58px, calc(var(--safe-bottom) + 58px));
        gap: 6px;
      }

      .progress-control-btn {
        width: 32px;
        height: 32px;
      }

      .time-readout {
        min-width: 76px;
        font-size: 12px;
      }
    }

    /* Keep one slim progress rail; the jelly sprite is its only visible thumb. */
    .hero.intro-done .mobile-progress {
      height: 20px !important;
      border: 0 !important;
      border-radius: 0 !important;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.96), rgba(215, 201, 255, 0.95)) 0 50% / var(--progress, 0%) 3px no-repeat,
        linear-gradient(90deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.22)) 0 50% / 100% 3px no-repeat !important;
      box-shadow: none !important;
    }

    .mobile-progress::-webkit-slider-runnable-track {
      height: 3px !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    .mobile-progress::-webkit-slider-thumb {
      width: 1px !important;
      height: 1px !important;
      margin-top: 1px !important;
      border: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      opacity: 0 !important;
    }

    .mobile-progress::-moz-range-track {
      height: 3px !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    .mobile-progress::-moz-range-thumb {
      width: 1px !important;
      height: 1px !important;
      border: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      opacity: 0 !important;
    }

    .progress-sprite {
      width: 38px !important;
      height: 38px !important;
      z-index: 12 !important;
      pointer-events: none !important;
    }

    .hello-gloss {
      opacity: 0.92 !important;
      transform: translate(-2px, -4px) !important;
    }

    .compact-play .play-icon {
      display: block !important;
    }

    .compact-play .pause-icon {
      display: none !important;
    }

    .hero.is-playing .compact-play .play-icon {
      display: none !important;
    }

    .hero.is-playing .compact-play .pause-icon {
      display: block !important;
    }

    .volume-control,
    .more-menu {
      position: relative;
      flex: 0 0 auto;
    }

    .volume-popover,
    .more-panel {
      position: absolute;
      right: 0;
      bottom: calc(100% + 10px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(10, 10, 14, 0.88);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
    }

    .volume-popover {
      display: grid;
      place-items: center;
      width: 132px;
      height: 42px;
      padding: 0 12px;
      border-radius: 999px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease;
    }

    .volume-control.is-open .volume-popover,
    .volume-control:focus-within .volume-popover,
    .volume-control:hover .volume-popover {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
    }

    .volume-slider {
      width: 108px;
      height: 4px;
      margin: 0;
      accent-color: #d9c8ff;
      cursor: pointer;
    }

    .more-menu summary {
      list-style: none;
    }

    .more-menu summary::-webkit-details-marker {
      display: none;
    }

    .more-panel {
      display: grid;
      gap: 3px;
      width: 164px;
      padding: 8px;
      border-radius: 12px;
    }

    .more-caption {
      padding: 7px 9px 4px;
      color: rgba(255, 255, 255, 0.52);
      font-size: 11px;
      font-weight: 700;
    }

    .speed-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
    }

    .speed-option,
    .pip-btn {
      min-height: 34px;
      padding: 7px 9px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: rgba(255, 255, 255, 0.9);
      font: 700 12px/1 Inter, "Segoe UI", Arial, sans-serif;
      cursor: pointer;
    }

    .speed-option:hover,
    .speed-option.is-active,
    .pip-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .pip-btn {
      width: 100%;
      margin-top: 4px;
      text-align: left;
    }

    @media (max-width: 640px) {
      .progress-sprite {
        width: 32px !important;
        height: 32px !important;
      }

      .progress-controls {
        gap: 4px;
      }

      .progress-control-btn {
        width: 30px;
        height: 30px;
      }

      .progress-control-btn svg {
        width: 19px;
        height: 19px;
      }

      .time-readout {
        min-width: 70px;
        font-size: 11px;
      }

      .volume-popover {
        right: -36px;
        width: 118px;
      }

      .volume-slider {
        width: 94px;
      }

      .more-panel {
        right: -2px;
        width: 150px;
      }
    }
    /* Responsive, single-face jelly intro. */
    .hello-extrude-deep,
    .hello-extrude-mid,
    .hello-extrude-lit,
    .hello-depth,
    .hello-jelly-back {
      display: none;
    }

    .intro-hello-wrap {
      width: min(72vw, 880px);
      filter:
        drop-shadow(0 18px 18px rgba(101, 65, 202, 0.34))
        drop-shadow(0 0 24px rgba(205, 235, 255, 0.28))
        drop-shadow(0 0 46px rgba(255, 151, 226, 0.2));
    }

    .hello-script,
    .hello-fill {
      opacity: 0.96;
    }

    .intro-screen {
      contain: strict;
    }

    @media (max-width: 760px) {
      .intro-screen {
        display: none !important;
      }

      .intro-stage {
        width: 100vw;
        height: min(62vw, 280px);
      }

      .intro-hello-wrap {
        width: min(88vw, 390px);
        max-width: calc(100vw - 28px);
        filter:
          drop-shadow(0 10px 12px rgba(101, 65, 202, 0.28))
          drop-shadow(0 0 16px rgba(205, 235, 255, 0.24))
          drop-shadow(0 0 28px rgba(255, 151, 226, 0.16));
        animation-duration: 1.7s;
      }

      .hello-script,
      .hello-fill,
      .hello-glow-base,
      .hello-bottom-glow,
      .hello-inner-light,
      .hello-gloss {
        animation-duration: 1.55s;
      }

      .hello-underline {
        stroke-width: 8;
        animation-duration: 0.62s;
        animation-delay: 0.72s;
      }

      .intro-screen {
        background:
          radial-gradient(circle at 50% 45%, rgba(198, 184, 255, 0.1), transparent 0 24%, transparent 48%),
          radial-gradient(circle at 50% 58%, rgba(255, 162, 231, 0.08), transparent 0 18%, transparent 42%),
          #000;
      }
    }

    @media (max-width: 760px) and (orientation: landscape) {
      .intro-stage {
        height: min(48vw, 230px);
      }

      .intro-hello-wrap {
        width: min(70vw, 470px);
      }
    }
  </style>
</head>

  <script>
    const hero = document.querySelector(".hero");
    const introCanvas = document.querySelector(".intro-glitter");
    const introCtx = introCanvas.getContext("2d");
    const video = document.querySelector(".hero-video");
    const videoStatus = document.querySelector(".video-status");
    const mobilePlay = document.querySelector(".mobile-play");
    const mobileProgress = document.querySelector(".mobile-progress");
    const progressHit = document.querySelector(".progress-hit");
    const progressSprite = document.querySelector(".progress-sprite");
    const progressTooltip = document.querySelector(".progress-tooltip");
    const compactPlay = document.querySelector(".compact-play");
    const timeCurrent = document.querySelector(".time-current");
    const timeTotal = document.querySelector(".time-total");
    const volumeControl = document.querySelector(".volume-control");
    const volumeButton = document.querySelector(".volume-btn");
    const volumeSlider = document.querySelector(".volume-slider");
    const fullscreenButton = document.querySelector(".fullscreen-btn");
    const moreMenu = document.querySelector(".more-menu");
    const speedButtons = document.querySelectorAll(".speed-option");
    const pipButton = document.querySelector(".pip-btn");
    const canvas = document.querySelector(".cursor-fx");
    const ctx = canvas.getContext("2d");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const isCoarsePointer = window.matchMedia("(pointer: coarse)").matches;
    const mobileLayoutQuery = window.matchMedia("(max-width: 760px)");
    const pointer = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      followX: window.innerWidth / 2,
      followY: window.innerHeight / 2,
      active: false,
      hue: 190
    };
    const particles = [];
    const ripples = [];
    const introStars = [];
    const introPalette = [
      [235, 240, 255],
      [198, 190, 255],
      [255, 184, 232]
    ];
    let introLastTime = 0;
    let introCanvasCleared = false;
    let lastRenderTime = 0;
    const touch = {
      active: false,
      startX: 0,
      startY: 0,
      lastX: 0,
      lastY: 0,
      lastBurst: 0,
      infoTimer: 0
    };
    let isScrubbing = false;
    let controlsTimer = 0;

    function revealControls(delay = 1500) {
      hero.classList.add("controls-visible");
      window.clearTimeout(controlsTimer);
      if (delay > 0) {
        controlsTimer = window.setTimeout(() => {
          if (!isScrubbing) {
            hero.classList.remove("controls-visible");
          }
        }, delay);
      }
      updateProgressSprite();
    }

    function hideControls() {
      window.clearTimeout(controlsTimer);
      if (!isScrubbing) {
        hero.classList.remove("controls-visible");
      }
    }

    async function autoStartMobileVideo() {
      if (!mobileLayoutQuery.matches && !isCoarsePointer) return;
      video.muted = false;
      if (video.volume <= 0) video.volume = 1;
      try {
        await video.play();
      } catch (error) {
        hero.classList.add("is-ready");
      }
    }

    window.setTimeout(() => {
      hero.classList.add("intro-done");
      hideControls();
      autoStartMobileVideo();
    }, mobileLayoutQuery.matches ? 0 : (reduceMotion ? 700 : 2450));

    window.setInterval(() => {
      if (document.hidden || mobilePlay.classList.contains("is-smiling")) return;
      mobilePlay.classList.add("is-blinking");
      window.setTimeout(() => {
        mobilePlay.classList.remove("is-blinking");
      }, 130);
    }, 3600);

    function setVideoSource() {
      const isLocalPreview = window.location.protocol === "file:" ||
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";
      video.src = isLocalPreview ? video.dataset.localSrc : video.dataset.remoteSrc;
    }

    function formatTime(value) {
      if (!Number.isFinite(value) || value < 0) return "0:00";
      const total = Math.floor(value);
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const seconds = total % 60;
      if (hours > 0) {
        return `${hours}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }
      return `${minutes}:${String(seconds).padStart(2, "0")}`;
    }

    function getVideoDuration() {
      return Number.isFinite(video.duration) && video.duration > 0 ? video.duration : 0;
    }

    function updateTimeReadout(progress) {
      const duration = getVideoDuration();
      const previewTime = Number.isFinite(progress) && duration > 0
        ? duration * Math.max(0, Math.min(1, progress))
        : video.currentTime || 0;
      const currentLabel = formatTime(previewTime);
      const totalLabel = formatTime(duration);

      if (timeCurrent) timeCurrent.textContent = currentLabel;
      if (timeTotal) timeTotal.textContent = totalLabel;
      if (progressTooltip) progressTooltip.textContent = currentLabel;
      if (mobileProgress) {
        mobileProgress.setAttribute("aria-valuetext", `${currentLabel} / ${totalLabel}`);
      }
    }

    function syncVolumeUI() {
      if (volumeSlider) {
        volumeSlider.value = Math.round((video.muted ? 0 : video.volume) * 100);
      }
      if (volumeButton) {
        volumeButton.setAttribute("aria-label", `调节音量，当前 ${Math.round((video.muted ? 0 : video.volume) * 100)}%`);
      }
    }

    function togglePlayback(x, y) {
      if (video.paused) {
        playVideoFromGesture(x || window.innerWidth / 2, y || window.innerHeight / 2);
      } else {
        video.pause();
      }
    }

    function toggleFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen?.();
        return;
      }
      const fullscreenTarget = hero.requestFullscreen ? hero : video;
      fullscreenTarget.requestFullscreen?.();
    }

    function makeIntroStar() {
      return {
        x: 0,
        y: 0,
        z: 1,
        px: NaN,
        py: NaN,
        seed: 0,
        speed: 1,
        size: 1,
        color: 0
      };
    }

    function resetIntroStar(star, initial = false) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 0.2 + Math.random() * 1.4;
      star.x = Math.cos(angle) * radius;
      star.y = Math.sin(angle) * radius;
      star.z = initial ? 0.18 + Math.random() * 0.82 : 1;
      star.px = NaN;
      star.py = NaN;
      star.seed = Math.random() * 1000;
      star.speed = 0.7 + Math.random() * 0.9;
      star.size = 0.55 + Math.random() * 1.5;
      star.color = Math.floor(Math.random() * introPalette.length);
    }

    function syncIntroStars() {
      const target = reduceMotion ? 32 : (mobileLayoutQuery.matches ? 56 : 150);
      while (introStars.length < target) {
        const star = makeIntroStar();
        resetIntroStar(star, true);
        introStars.push(star);
      }
      if (introStars.length > target) {
        introStars.length = target;
      }
    }

    function resizeIntroGlitter() {
      const ratio = mobileLayoutQuery.matches ? 1 : Math.min(window.devicePixelRatio || 1, 1.5);
      introCanvas.width = Math.floor(window.innerWidth * ratio);
      introCanvas.height = Math.floor(window.innerHeight * ratio);
      introCanvas.style.width = `${window.innerWidth}px`;
      introCanvas.style.height = `${window.innerHeight}px`;
      introCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
      introCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      syncIntroStars();
    }

    function drawIntroGlitter(time) {
      if (hero.classList.contains("intro-done")) {
        if (!introCanvasCleared) {
          introCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
          introCanvasCleared = true;
        }
        return;
      }

      introCanvasCleared = false;

      syncIntroStars();
      const w = window.innerWidth;
      const h = window.innerHeight;
      const cx = w / 2;
      const cy = h / 2;
      const scale = Math.min(w, h) * 0.92;
      const focalDepth = 0.13;
      const last = introLastTime || time;
      const dt = Math.max(0.001, Math.min(0.1, (time - last) / 1000)) * 60;
      introLastTime = time;

      introCtx.globalAlpha = 1;
      introCtx.globalCompositeOperation = "destination-out";
      introCtx.fillStyle = "rgba(0, 0, 0, 0.2)";
      introCtx.fillRect(0, 0, w, h);
      introCtx.globalCompositeOperation = "lighter";

      for (const star of introStars) {
        star.z -= 0.0047 * star.speed * dt;
        if (star.z <= focalDepth) {
          resetIntroStar(star);
          continue;
        }

        const wobble = (1 - star.z) * 0.22;
        const tx = star.x + Math.sin(time * 0.00125 + star.seed) * wobble;
        const ty = star.y + Math.cos(time * 0.00105 + star.seed * 0.7) * wobble;
        const persp = focalDepth / Math.max(star.z, 0.0001);
        const sx = cx + tx * persp * scale;
        const sy = cy + ty * persp * scale;

        if (sx < -30 || sx > w + 30 || sy < -30 || sy > h + 30) {
          resetIntroStar(star);
          continue;
        }

        const life = 1 - star.z;
        const radius = Math.min(2.8, (0.42 + life * 3.5) * star.size);
        const flash = Math.sin(time * 0.0048 + star.seed) > 0.994 ? 1.55 : 1;
        const alpha = Math.min(0.58, (0.1 + life * 0.6) * flash);
        const color = introPalette[star.color];
        const colorString = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;

        if (!Number.isNaN(star.px) && !Number.isNaN(star.py)) {
          introCtx.globalAlpha = alpha * 0.22;
          introCtx.strokeStyle = colorString;
          introCtx.lineWidth = Math.max(0.35, radius * 0.24);
          introCtx.beginPath();
          introCtx.moveTo(star.px, star.py);
          introCtx.lineTo(sx, sy);
          introCtx.stroke();
        }

        introCtx.globalAlpha = alpha;
        introCtx.fillStyle = colorString;
        introCtx.fillRect(sx - radius, sy - radius, radius * 2, radius * 2);

        if (flash > 1) {
          introCtx.globalAlpha = alpha * 0.36;
          introCtx.fillRect(sx - radius * 1.6, sy - 0.8, radius * 3.2, 1.6);
          introCtx.fillRect(sx - 0.8, sy - radius * 1.6, 1.6, radius * 3.2);
        }

        star.px = sx;
        star.py = sy;
      }

      introCtx.globalAlpha = 1;
      introCtx.globalCompositeOperation = "source-over";
    }

    function markVideoReady() {
      hero.classList.add("is-ready");
      hero.classList.remove("has-error");
      updateProgress();
      updateTimeReadout();
      syncVolumeUI();
    }

    function markVideoError() {
      hero.classList.add("has-error");
      hero.classList.remove("is-ready");
      videoStatus.textContent = "视频没有加载出来，请检查视频链接";
    }

    function resizeCanvas() {
      const ratio = mobileLayoutQuery.matches ? 1 : Math.min(window.devicePixelRatio || 1, 1.5);
      canvas.width = Math.floor(window.innerWidth * ratio);
      canvas.height = Math.floor(window.innerHeight * ratio);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      resizeIntroGlitter();
      updateProgressSprite();
    }

    function addParticle(x, y, burst = false) {
      const angle = Math.random() * Math.PI * 2;
      const speed = burst ? 2.2 + Math.random() * 5.2 : 0.5 + Math.random() * 2.1;
      particles.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (burst ? 0.5 : 0),
        size: burst ? 3 + Math.random() * 7 : 2 + Math.random() * 5,
        life: burst ? 58 + Math.random() * 26 : 36 + Math.random() * 22,
        maxLife: burst ? 84 : 58,
        hue: pointer.hue + Math.random() * 58,
        spin: Math.random() * Math.PI,
        shape: Math.random() > 0.62 ? "spark" : "dot"
      });

      if (particles.length > 180) {
        particles.splice(0, particles.length - 180);
      }
    }

    function addRipple(x, y, strong = false) {
      ripples.push({
        x,
        y,
        life: 48,
        maxLife: 48,
        hue: pointer.hue,
        rotate: Math.random() * Math.PI,
        strong
      });

      if (ripples.length > 18) {
        ripples.splice(0, ripples.length - 18);
      }
    }

    function addTouchBurst(x, y, strong = false) {
      addRipple(x, y, strong);
      const amount = strong ? 48 : 24;
      for (let i = 0; i < amount; i += 1) {
        const angle = (Math.PI * 2 * i) / amount + (Math.random() - 0.5) * 0.7;
        const speed = (strong ? 1.4 : 0.9) + Math.random() * (strong ? 5.2 : 2.8);
        const shapes = ["crescent", "star", "diamond", "lunar-dot", "spark", "dot"];
        const hue = 262 + Math.random() * 46;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - (strong ? 0.35 : 0.12),
          size: (strong ? 5 : 3.5) + Math.random() * (strong ? 9 : 6),
          life: (strong ? 62 : 46) + Math.random() * 22,
          maxLife: strong ? 84 : 62,
          hue,
          saturation: 82 + Math.random() * 14,
          lightness: 74 + Math.random() * 14,
          spin: Math.random() * Math.PI,
          shape: shapes[i % shapes.length],
          alphaBase: strong ? 0.9 : 0.72
        });
      }

      if (strong) {
        addRipple(x, y, true);
        for (let i = 0; i < 12; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 1.2 + Math.random() * 2.4;
          particles.push({
            x: x + Math.cos(angle) * 8,
            y: y + Math.sin(angle) * 8,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 0.18,
            size: 10 + Math.random() * 18,
            life: 34 + Math.random() * 18,
            maxLife: 54,
            hue: 282 + Math.random() * 28,
            saturation: 84,
            lightness: 78,
            spin: Math.random() * Math.PI,
            shape: "dot",
            alphaBase: 0.2
          });
        }
      }

      if (particles.length > 220) {
        particles.splice(0, particles.length - 220);
      }
    }

    function updatePlayEyes(x, y) {
      const rect = mobilePlay.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const dx = Math.max(-1, Math.min(1, (x - centerX) / (rect.width * 0.44)));
      const dy = Math.max(-1, Math.min(1, (y - centerY) / (rect.height * 0.48)));
      mobilePlay.style.setProperty("--eye-x", `${dx * 5}px`);
      mobilePlay.style.setProperty("--eye-y", `${dy * 4}px`);
      mobilePlay.style.setProperty("--bunny-tilt", `${dx * 4}deg`);
    }

    function resetPlayEyes() {
      mobilePlay.style.setProperty("--eye-x", "0px");
      mobilePlay.style.setProperty("--eye-y", "0px");
      mobilePlay.style.setProperty("--bunny-tilt", "0deg");
    }

    function smilePlayButton() {
      mobilePlay.classList.add("is-pressed");
      mobilePlay.classList.remove("is-blinking");
      window.clearTimeout(smilePlayButton.timer);
      smilePlayButton.timer = window.setTimeout(() => {
        mobilePlay.classList.remove("is-pressed");
      }, 430);
    }

    function drawSpark(x, y, radius, rotation) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.beginPath();
      for (let i = 0; i < 8; i += 1) {
        const distance = i % 2 === 0 ? radius : radius * 0.34;
        const angle = (Math.PI * 2 * i) / 8;
        ctx.lineTo(Math.cos(angle) * distance, Math.sin(angle) * distance);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawDiamond(x, y, radius, rotation) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.beginPath();
      ctx.moveTo(0, -radius);
      ctx.lineTo(radius * 0.72, 0);
      ctx.lineTo(0, radius);
      ctx.lineTo(-radius * 0.72, 0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawCrescent(x, y, radius, rotation) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.beginPath();
      ctx.arc(0, 0, radius, Math.PI * 0.22, Math.PI * 1.76, false);
      ctx.arc(radius * 0.48, -radius * 0.08, radius * 0.86, Math.PI * 1.7, Math.PI * 0.3, true);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawCursorBadge(time) {
      if (!pointer.active || isCoarsePointer) return;

      const pulse = 1 + Math.sin(time * 0.008) * 0.12;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.translate(pointer.followX, pointer.followY);
      ctx.rotate(time * 0.002);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.38)";
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 8]);
      ctx.beginPath();
      ctx.arc(0, 0, 28 * pulse, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = `hsla(${pointer.hue}, 96%, 66%, 0.42)`;
      drawSpark(0, 0, 18 * pulse, -time * 0.004);
      ctx.restore();
    }

    function drawRipples(time) {
      for (let i = ripples.length - 1; i >= 0; i -= 1) {
        const ripple = ripples[i];
        ripple.life -= 1;

        const progress = 1 - ripple.life / ripple.maxLife;
        const alpha = Math.max(1 - progress, 0);
        const radius = 18 + progress * (ripple.strong ? 112 : 78);

        ctx.save();
        ctx.translate(ripple.x, ripple.y);
        ctx.rotate(ripple.rotate + time * 0.002);
        ctx.strokeStyle = `hsla(${ripple.hue + 12}, 92%, 78%, ${alpha * 0.46})`;
        ctx.lineWidth = ripple.strong ? 4 : 2;
        ctx.shadowColor = `hsla(${ripple.hue + 18}, 92%, 78%, ${alpha})`;
        ctx.shadowBlur = ripple.strong ? 22 : 12;
        for (let ring = 0; ring < (ripple.strong ? 3 : 1); ring += 1) {
          const ringRadius = radius + ring * 18;
          ctx.globalAlpha = alpha * (0.72 - ring * 0.18);
          if (ring === 1) {
            ctx.setLineDash([5, 14]);
          } else {
            ctx.setLineDash([]);
          }
          ctx.beginPath();
          ctx.ellipse(0, 0, ringRadius, ringRadius * (0.72 + progress * 0.14), 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;

        ctx.fillStyle = `hsla(${ripple.hue + 54}, 98%, 68%, ${alpha * 0.7})`;
        for (let dot = 0; dot < (ripple.strong ? 9 : 5); dot += 1) {
          const angle = ripple.rotate + dot * (Math.PI * 2 / (ripple.strong ? 9 : 5)) + time * 0.003;
          const dotRadius = radius + Math.sin(time * 0.004 + dot) * 5;
          ctx.beginPath();
          ctx.arc(Math.cos(angle) * dotRadius, Math.sin(angle) * dotRadius * 0.74, (ripple.strong ? 3.2 : 2.2) * alpha, 0, Math.PI * 2);
          ctx.fill();
        }

        if (ripple.strong) {
          ctx.fillStyle = `hsla(${ripple.hue + 28}, 90%, 86%, ${alpha * 0.72})`;
          drawCrescent(Math.cos(time * 0.002) * radius * 0.58, Math.sin(time * 0.002) * radius * 0.46, 9 * alpha, ripple.rotate - 0.6);
          drawSpark(Math.cos(time * 0.002 + 2.4) * radius * 0.72, Math.sin(time * 0.002 + 2.4) * radius * 0.54, 8 * alpha, -ripple.rotate);
        }
        ctx.restore();

        if (ripple.life <= 0) {
          ripples.splice(i, 1);
        }
      }
    }

    function updateProgress() {
      if (!Number.isFinite(video.duration) || video.duration <= 0) {
        setProgressVisual(0);
        return;
      }
      const progress = Math.min(video.currentTime / video.duration, 1);
      setProgressVisual(progress);
    }

    function setProgressVisual(progress) {
      const clamped = Math.max(0, Math.min(1, progress || 0));
      hero.classList.toggle("has-progress", clamped > 0.01);
      mobileProgress.value = Math.round(clamped * 1000);
      mobileProgress.style.setProperty("--progress", `${clamped * 100}%`);
      updateTimeReadout(clamped);
      updateProgressSprite(clamped);
    }

    function updateProgressSprite(progress = Number(mobileProgress.value) / 1000) {
      const rect = mobileProgress.getBoundingClientRect();
      if (!rect.width || !progressSprite) return;

      if (progressHit) {
        progressHit.style.setProperty("--progress-hit-left", `${rect.left}px`);
        progressHit.style.setProperty("--progress-hit-top", `${rect.top - 24}px`);
        progressHit.style.setProperty("--progress-hit-width", `${rect.width}px`);
        progressHit.style.setProperty("--progress-hit-height", `${rect.height + 48}px`);
      }

      const clamped = Math.max(0, Math.min(1, progress || 0));
      const x = rect.left + rect.width * clamped;
      const y = rect.top + rect.height / 2;
      progressSprite.style.setProperty("--progress-x", `${x}px`);
      progressSprite.style.setProperty("--progress-y", `${y}px`);
      if (progressTooltip) {
        progressTooltip.style.setProperty("--progress-x", `${x}px`);
        progressTooltip.style.setProperty("--progress-y", `${y}px`);
      }
    }

    function scrubToClientX(clientX) {
      const rect = mobileProgress.getBoundingClientRect();
      if (!rect.width) return;

      const progress = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      setProgressVisual(progress);
      if (Number.isFinite(video.duration) && video.duration > 0) {
        video.currentTime = progress * video.duration;
      }
    }

    function isPointInProgress(clientX, clientY) {
      const rect = mobileProgress.getBoundingClientRect();
      if (!rect.width || getComputedStyle(mobileProgress).display === "none") return false;

      const padX = 18;
      const padY = 28;
      return clientX >= rect.left - padX &&
        clientX <= rect.right + padX &&
        clientY >= rect.top - padY &&
        clientY <= rect.bottom + padY;
    }

    function beginProgressScrub(event) {
      isScrubbing = true;
      hero.classList.add("is-scrubbing");
      revealControls(0);
      scrubToClientX(event.clientX);
      const captureTarget = event.currentTarget || mobileProgress;
      if (captureTarget && typeof captureTarget.setPointerCapture === "function" && event.pointerId != null) {
        captureTarget.setPointerCapture(event.pointerId);
      }
      event.preventDefault();
      event.stopPropagation();
    }

    function endProgressScrub(clientX) {
      if (!isScrubbing) return;
      isScrubbing = false;
      hero.classList.remove("is-scrubbing");
      if (Number.isFinite(clientX)) {
        scrubToClientX(clientX);
      }
      revealControls(1200);
    }

    function bindProgressScrubber(target) {
      if (!target) return;

      target.addEventListener("pointerdown", beginProgressScrub);
      target.addEventListener("pointermove", (event) => {
        if (!isScrubbing) return;
        scrubToClientX(event.clientX);
        event.stopPropagation();
      });
      target.addEventListener("pointerup", (event) => {
        endProgressScrub(event.clientX);
        event.stopPropagation();
      });
      target.addEventListener("click", (event) => {
        scrubToClientX(event.clientX);
        event.stopPropagation();
      });
      target.addEventListener("mousedown", beginProgressScrub);
      target.addEventListener("touchstart", (event) => {
        const touchPoint = event.touches[0];
        if (!touchPoint) return;
        beginProgressScrub({
          clientX: touchPoint.clientX,
          clientY: touchPoint.clientY,
          currentTarget: target,
          preventDefault: () => event.preventDefault(),
          stopPropagation: () => event.stopPropagation()
        });
      }, { passive: false });
    }

    function showMobileInfo() {
      if (!isCoarsePointer) return;
      hero.classList.add("show-info");
      window.clearTimeout(touch.infoTimer);
      touch.infoTimer = window.setTimeout(() => {
        hero.classList.remove("show-info");
      }, 3600);
    }

    function hideMobileInfo() {
      hero.classList.remove("show-info");
      window.clearTimeout(touch.infoTimer);
    }

    async function playVideoFromGesture(x, y) {
      smilePlayButton();
      addTouchBurst(x || window.innerWidth / 2, y || window.innerHeight / 2, true);
      try {
        await video.play();
      } catch (error) {
        videoStatus.textContent = "点一下视频或播放按钮开始播放";
        hero.classList.add("is-ready");
      }
    }

    function render(time) {
      if (mobileLayoutQuery.matches && time - lastRenderTime < 32) {
        requestAnimationFrame(render);
        return;
      }
      lastRenderTime = time;
      drawIntroGlitter(time);
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      if (!isScrubbing && !video.paused && Number.isFinite(video.duration) && video.duration > 0) {
        updateProgress();
      }

      pointer.followX += (pointer.x - pointer.followX) * 0.16;
      pointer.followY += (pointer.y - pointer.followY) * 0.16;
      pointer.hue = (pointer.hue + 0.8) % 360;

      if (pointer.active && !reduceMotion) {
        addParticle(pointer.followX, pointer.followY);
      }

      ctx.globalCompositeOperation = "lighter";
      drawRipples(time);
      for (let i = particles.length - 1; i >= 0; i -= 1) {
        const p = particles[i];
        p.life -= 1;
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97;
        p.vy = p.vy * 0.97 + 0.018;
        p.spin += 0.06;

        const alpha = Math.max(p.life / p.maxLife, 0) * (p.alphaBase || 1);
        const saturation = p.saturation || 96;
        const lightness = p.lightness || 68;
        ctx.fillStyle = `hsla(${p.hue}, ${saturation}%, ${lightness}%, ${alpha})`;
        ctx.shadowColor = `hsla(${p.hue}, ${saturation}%, ${lightness}%, ${alpha})`;
        ctx.shadowBlur = 16;

        if (p.shape === "spark") {
          drawSpark(p.x, p.y, p.size * alpha, p.spin);
        } else if (p.shape === "star") {
          drawSpark(p.x, p.y, p.size * 1.12 * alpha, p.spin);
        } else if (p.shape === "diamond") {
          drawDiamond(p.x, p.y, p.size * alpha, p.spin);
        } else if (p.shape === "crescent") {
          drawCrescent(p.x, p.y, p.size * 1.25 * alpha, p.spin);
        } else if (p.shape === "lunar-dot") {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.72})`;
          ctx.beginPath();
          ctx.arc(p.x - p.size * 0.24, p.y - p.size * 0.24, p.size * 0.22 * alpha, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }

        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
      ctx.shadowBlur = 0;

      drawCursorBadge(time);
      requestAnimationFrame(render);
    }

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("pointermove", (event) => {
      revealControls(video.paused ? 2200 : 1400);
      if (isScrubbing) {
        scrubToClientX(event.clientX);
        return;
      }

      if (event.buttons === 1 && isPointInProgress(event.clientX, event.clientY)) {
        isScrubbing = true;
        hero.classList.add("is-scrubbing");
        scrubToClientX(event.clientX);
        return;
      }

      const controlSafeZone = window.innerHeight - 86;
      if (event.pointerType === "touch" || isCoarsePointer) {
        if (!touch.active || reduceMotion) return;
        const distance = Math.hypot(event.clientX - touch.lastX, event.clientY - touch.lastY);
        if (distance > 18) {
          touch.lastX = event.clientX;
          touch.lastY = event.clientY;
          if (event.clientY < controlSafeZone) {
            addParticle(event.clientX, event.clientY, false);
          }
        }
        return;
      }

      updatePlayEyes(event.clientX, event.clientY);
      pointer.active = event.clientY < controlSafeZone;
      pointer.x = event.clientX;
      pointer.y = event.clientY;
    });
    window.addEventListener("pointerdown", (event) => {
      revealControls(video.paused ? 2200 : 1400);
      const target = event.target instanceof Element ? event.target : null;
      if (target && target.closest(".mobile-progress")) {
        beginProgressScrub(event);
        return;
      }

      if (isPointInProgress(event.clientX, event.clientY)) {
        beginProgressScrub(event);
        return;
      }

      if (event.clientY > window.innerHeight - 86) return;
      if (target && target.closest(".mobile-progress, .mobile-play")) return;

      if (event.pointerType === "touch" || isCoarsePointer) {
        touch.active = true;
        touch.startX = event.clientX;
        touch.startY = event.clientY;
        touch.lastX = event.clientX;
        touch.lastY = event.clientY;
        pointer.active = false;
        if (!reduceMotion) {
          addTouchBurst(event.clientX, event.clientY, true);
        }
        return;
      }

      pointer.x = event.clientX;
      pointer.y = event.clientY;
      pointer.active = true;
      for (let i = 0; i < 34; i += 1) {
        addParticle(event.clientX, event.clientY, true);
      }
    });
    window.addEventListener("mousedown", (event) => {
      if (!isPointInProgress(event.clientX, event.clientY)) return;
      beginProgressScrub(event);
    });
    window.addEventListener("click", (event) => {
      if (!isPointInProgress(event.clientX, event.clientY)) return;
      scrubToClientX(event.clientX);
      event.stopPropagation();
    });
    window.addEventListener("touchstart", (event) => {
      const touchPoint = event.touches[0];
      if (!touchPoint || !isPointInProgress(touchPoint.clientX, touchPoint.clientY)) return;
      beginProgressScrub({
        clientX: touchPoint.clientX,
        clientY: touchPoint.clientY,
        currentTarget: mobileProgress,
        preventDefault: () => event.preventDefault(),
        stopPropagation: () => event.stopPropagation()
      });
    }, { passive: false });
    window.addEventListener("pointerup", (event) => {
      if (isScrubbing) {
        endProgressScrub(event.clientX);
        return;
      }

      if (!touch.active) return;
      touch.active = false;
      const deltaY = event.clientY - touch.startY;
      const deltaX = Math.abs(event.clientX - touch.startX);
      if (deltaY < -48 && deltaX < 90) {
        showMobileInfo();
      } else if (deltaY > 48) {
        hideMobileInfo();
      }
    });
    window.addEventListener("pointercancel", () => {
      endProgressScrub();
      touch.active = false;
    });
    window.addEventListener("pointerleave", () => {
      pointer.active = false;
      resetPlayEyes();
    });
    mobilePlay.addEventListener("click", (event) => {
      updatePlayEyes(event.clientX, event.clientY);
      togglePlayback(event.clientX, event.clientY);
    });
    compactPlay.addEventListener("click", (event) => {
      revealControls(video.paused ? 2200 : 1400);
      togglePlayback(event.clientX, event.clientY);
      event.stopPropagation();
    });
    video.addEventListener("click", (event) => {
      togglePlayback(event.clientX, event.clientY);
    });
    volumeButton.addEventListener("click", (event) => {
      const isOpen = volumeControl.classList.toggle("is-open");
      volumeButton.setAttribute("aria-expanded", String(isOpen));
      revealControls(0);
      event.stopPropagation();
    });
    volumeSlider.addEventListener("input", (event) => {
      const nextVolume = Math.max(0, Math.min(1, Number(event.currentTarget.value) / 100));
      video.volume = nextVolume;
      video.muted = false;
      syncVolumeUI();
      revealControls(0);
      event.stopPropagation();
    });
    fullscreenButton.addEventListener("click", (event) => {
      revealControls(1600);
      toggleFullscreen();
      event.stopPropagation();
    });
    speedButtons.forEach((button) => {
      button.addEventListener("click", (event) => {
        const speed = Number(button.dataset.speed);
        if (!Number.isFinite(speed)) return;
        video.playbackRate = speed;
        speedButtons.forEach((item) => item.classList.toggle("is-active", item === button));
        moreMenu.open = false;
        revealControls(1800);
        event.stopPropagation();
      });
    });
    pipButton.addEventListener("click", async (event) => {
      event.stopPropagation();
      moreMenu.open = false;
      revealControls(1800);
      if (!document.pictureInPictureEnabled || video.disablePictureInPicture) return;
      try {
        if (document.pictureInPictureElement) {
          await document.exitPictureInPicture();
        } else {
          await video.requestPictureInPicture();
        }
      } catch (error) {
        // The browser may block picture-in-picture until playback has started.
      }
    });
    moreMenu.addEventListener("toggle", () => {
      if (moreMenu.open) revealControls(0);
    });
    document.addEventListener("pointerdown", (event) => {
      const target = event.target instanceof Element ? event.target : null;
      if (target && (volumeControl.contains(target) || moreMenu.contains(target))) return;
      volumeControl.classList.remove("is-open");
      volumeButton.setAttribute("aria-expanded", "false");
      moreMenu.open = false;
    });
    bindProgressScrubber(mobileProgress);
    bindProgressScrubber(progressHit);
    window.addEventListener("mousemove", (event) => {
      revealControls(video.paused ? 2200 : 1400);
      if (!isScrubbing && !(event.buttons === 1 && isPointInProgress(event.clientX, event.clientY))) return;
      if (!isScrubbing) {
        isScrubbing = true;
        hero.classList.add("is-scrubbing");
      }
      scrubToClientX(event.clientX);
    });
    window.addEventListener("mouseup", (event) => {
      endProgressScrub(event.clientX);
    });
    window.addEventListener("touchmove", (event) => {
      revealControls(video.paused ? 2200 : 1400);
      if (!isScrubbing) return;
      const touchPoint = event.touches[0];
      if (!touchPoint) return;
      scrubToClientX(touchPoint.clientX);
      event.preventDefault();
    }, { passive: false });
    window.addEventListener("touchend", () => {
      endProgressScrub();
    });
    mobileProgress.addEventListener("input", () => {
      revealControls(1400);
      const progress = Number(mobileProgress.value) / 1000;
      setProgressVisual(progress);
      if (Number.isFinite(video.duration) && video.duration > 0) {
        video.currentTime = progress * video.duration;
      }
    });
    video.addEventListener("loadeddata", markVideoReady);
    video.addEventListener("loadedmetadata", () => {
      updateProgress();
      updateTimeReadout();
    });
    video.addEventListener("canplay", markVideoReady);
    video.addEventListener("error", markVideoError);
    video.addEventListener("play", () => {
      hero.classList.add("is-playing");
      hero.classList.add("is-ready");
      revealControls(900);
    });
    video.addEventListener("pause", () => {
      hero.classList.remove("is-playing");
      revealControls(1600);
    });
    video.addEventListener("ended", () => {
      hero.classList.remove("is-playing");
      revealControls(1800);
    });
    video.addEventListener("timeupdate", updateProgress);
    video.addEventListener("durationchange", updateProgress);
    video.addEventListener("volumechange", syncVolumeUI);
    video.addEventListener("ratechange", () => {
      speedButtons.forEach((button) => {
        button.classList.toggle("is-active", Number(button.dataset.speed) === video.playbackRate);
      });
    });
    if (!document.pictureInPictureEnabled || video.disablePictureInPicture) {
      pipButton.disabled = true;
      pipButton.style.opacity = "0.45";
    }
    syncVolumeUI();
    updateTimeReadout(0);
    setVideoSource();
    if (video.readyState >= 2) {
      markVideoReady();
    }
    resizeCanvas();
    requestAnimationFrame(render);
  </script>
</body>
</html>
